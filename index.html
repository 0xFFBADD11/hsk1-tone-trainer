<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSP fallback for static hosts (e.g. GitHub Pages) that cannot set
       response headers; mirrors the Cloudflare Worker policy where meta
       directives are honored.
       BRANCH/DEV NOTE: this policy is temporarily relaxed to load Transformers.js
       and the Whisper model from the jsDelivr / Hugging Face CDNs while the
       pronunciation feature is developed. Before merging to main the model is
       vendored locally and this tightens back to 'self' (keeping only
       'wasm-unsafe-eval' and worker-src for WASM). Audio is never uploaded. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'self' https://cdn.jsdelivr.net; base-uri 'none'; object-src 'none'">
  <title>HSK 1 Tone Trainer</title>
  <meta name="description" content="Practice HSK 1 Mandarin vocabulary with pronunciation, pinyin, and microphone-based tone scoring.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <h1>HSK 1 Tone Trainer</h1>
    <p class="tagline">Listen, repeat, and get your Mandarin tones scored.</p>
  </header>
  <main id="app"></main>
  <footer>
    <p class="app-status" id="app-status"></p>
    <p>All recording and scoring happen in your browser. No audio is uploaded.</p>
    <p class="build">build <span id="build">unknown (stale cache)</span></p>
  </footer>
  <!-- Bump the ?v= token on every deploy so iOS Safari refetches the module
       graph instead of serving cached copies of changed files. -->
  <script type="module" src="assets/js/app.js?v=20260630s"></script>
</body>
</html>
